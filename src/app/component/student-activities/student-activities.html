<div class="container-fluid px-4 py-4">

  <!-- Header -->
  <div class="mb-4">
    <h5 class="fw-semibold mb-1">Available Activities</h5>
    <p class="text-muted small mb-0">Select an activity to start</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="service.activities$().length === 0" class="empty-card text-center py-5">
    <div class="empty-icon mb-3">📋</div>
    <p class="text-muted">No activities available yet.</p>
  </div>

  <!-- Activity cards -->
  <div class="row g-3">
    <div class="col-12" *ngFor="let activity of service.activities$()">
      <div class="activity-row d-flex align-items-center justify-content-between px-4 py-3 rounded">

        <!-- Left: icon + info -->
        <div class="d-flex align-items-center gap-3">
          <div class="activity-icon d-flex align-items-center justify-content-center rounded-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <div>
            <div class="fw-semibold">{{ activity.title }}</div>
            <div class="text-muted" style="font-size:0.78rem">
              {{ activity.questions.length }} question{{ activity.questions.length !== 1 ? 's' : '' }}
              <span class="mx-1">•</span>
              <span class="text-capitalize">{{ activity.type }}</span>
            </div>
          </div>
        </div>

        <!-- Right: badge + button -->
        <div class="d-flex align-items-center gap-3">
          <span class="type-badge text-capitalize"
                [class.badge-quiz]="activity.type === 'quiz'"
                [class.badge-assignment]="activity.type === 'assignment'">
            {{ activity.type }}
          </span>
          <a [routerLink]="['/activities', activity.id, 'take']"
             class="btn btn-primary btn-sm px-3">
            Start →
          </a>
        </div>

      </div>
    </div>
  </div>

</div>
