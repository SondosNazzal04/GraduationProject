<div class="activities-container">
  
  <!-- Header -->
  <div class="header">
    <h1>Activities & Assignment</h1>
    <button class="btn-create" (click)="openCreateForm()">
      + Create Activity
    </button>
  </div>

  <!-- Create Activity Form Modal -->
  <div *ngIf="showCreateForm" class="modal-overlay" (click)="closeCreateForm()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Create New Activity</h2>
        <button class="btn-close" (click)="closeCreateForm()">✕</button>
      </div>

      <form [formGroup]="activityForm" class="create-form">
        <!-- معلومات النشاط -->
        <div class="form-section">
          <h3>Activity Information</h3>
          
          <div class="form-group">
            <label>Activity Title</label>
            <input type="text" formControlName="title" placeholder="e.g., Quiz #3">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Subject</label>
              <select formControlName="subject">
                <option value="">Select Subject</option>
                <option value="Math">Math</option>
                <option value="Arabic">Arabic</option>
                <option value="Science">Science</option>
              </select>
            </div>

            <div class="form-group">
              <label>Type</label>
              <select formControlName="type">
                <option value="quiz">Quiz</option>
                <option value="homework">Home work</option>
                <option value="project">Project</option>
              </select>
            </div>

            <div class="form-group">
              <label>Due Date</label>
              <input type="date" formControlName="dueDate">
            </div>
          </div>
        </div>

        <!-- الأسئلة -->
        <div class="form-section">
          <h3>Questions</h3>

          <div class="add-question">
            <div class="form-group">
              <label>Question</label>
              <textarea formControlName="questionText" rows="3" placeholder="Enter question..."></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Type</label>
                <select formControlName="questionType">
                  <option value="multiple-choice">Multiple Choice</option>
                  <option value="true-false">True/False</option>
                  <option value="short-answer">Short Answer</option>
                </select>
              </div>

              <div class="form-group">
                <label>Points</label>
                <input type="number" formControlName="points" min="1">
              </div>
            </div>

            <div class="form-group" *ngIf="activityForm.get('questionType')?.value === 'multiple-choice'">
              <label>Options (comma separated)</label>
              <input type="text" formControlName="options" placeholder="Option 1, Option 2, Option 3">
            </div>

            <div class="form-group">
              <label>Correct Answer</label>
              <input type="text" formControlName="correctAnswer" placeholder="Answer">
            </div>

            <button type="button" class="btn-add-question" (click)="addQuestion()">
              ✓ Add Question
            </button>
          </div>

          <!-- Questions List -->
          <div class="questions-preview">
            <div *ngIf="questions.length === 0" class="empty-message">
              No questions added yet
            </div>

            <div *ngFor="let q of questions; let i = index" class="question-item">
              <span class="q-number">Q{{ i + 1 }}</span>
              <span class="q-text">{{ q.text }}</span>
              <span class="q-points">{{ q.points }} pts</span>
              <button type="button" class="btn-remove" (click)="removeQuestion(i)">🗑️</button>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="modal-actions">
          <button type="button" class="btn-submit" (click)="submitActivity()">
            ✓ Create Activity
          </button>
          <button type="button" class="btn-cancel" (click)="closeCreateForm()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Current Activities List -->
  <div class="activities-list">
    <h2>Current Activities</h2>
    <div *ngFor="let activity of activities" class="activity-card">
      <div class="activity-icon">📋</div>
      <div class="activity-info">
        <h3>{{ activity.title }}</h3>
        <p>{{ activity.subject }} • {{ activity.type }}</p>
      </div>
      <div class="activity-actions">
        <button class="btn-edit">Edit</button>
        <button class="btn-delete">🗑️</button>
      </div>
    </div>
  </div>

</div>
