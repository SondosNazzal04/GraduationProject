<div class="login-bg">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-card shadow-lg">
      <div class="card-body">
        <div class="text-center mb-4">
          <!-- <img src="assets/graduation-icon.png" alt="Graduation" width="70" class="mb-3" *ngIf="showWelcomeIcon"> -->
          <h2 class="login-title">Welcome Back</h2>
          <div class="login-desc">Sign in to continue your learning adventure</div>
        </div>
        <form>
          <div class="mb-3"> 
            
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control form-control-lg" placeholder="student@eduventure.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control form-control-lg" placeholder="********">
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input type="checkbox" id="remember" class="form-check-input">
              <label for="remember" class="form-check-label">Remember me</label>
            </div>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
        </form>
        <div class="text-center mt-4 mb-2">
          <span>Don't have an account? <a href="#" class="register-link">Register now</a></span>
        </div>
        <hr>
        <div class="text-center mt-3">
          <a href="#" class="back-home">&larr; Back to home</a>
        </div>
      </div>
    </div>
  </div>
</div>
