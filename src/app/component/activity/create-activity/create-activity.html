<div class="container-fluid px-4 py-4">

  <!-- Header changes based on mode -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h5 class="fw-semibold mb-1">
        {{ isEditMode ? 'Edit Activity' : 'Create Activity' }}
      </h5>
      <p class="text-muted small mb-0">
        {{ isEditMode ? 'Update the activity details below' : 'Fill in the details to create a new activity' }}
      </p>
    </div>
    <a routerLink="/activities" class="btn btn-outline-secondary btn-sm">
      ← Back
    </a>
  </div>

  <div class="activities-card p-4">
    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Title -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Title</label>
        <input class="form-control" formControlName="title" placeholder="Activity title" />
        <div class="text-danger small mt-1"
             *ngIf="form.get('title')?.invalid && form.get('title')?.touched">
          Title is required
        </div>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea class="form-control" formControlName="description" rows="3"></textarea>
      </div>

      <!-- Type -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Activity type</label>
        <select class="form-select" formControlName="type">
          <option value="quiz">Quiz</option>
          <option value="assignment">Assignment</option>
        </select>
      </div>

      <!-- Questions -->
      <div formArrayName="questions">
        <div *ngFor="let q of questions.controls; let qi = index"
             [formGroupName]="qi" class="question-card p-3 mb-3 rounded">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-semibold small">Question {{ qi + 1 }}</span>
            <button type="button" class="btn btn-sm btn-link text-danger p-0"
                    (click)="removeQuestion(qi)">Remove</button>
          </div>

          <div class="mb-2">
            <input class="form-control form-control-sm"
                   formControlName="text" placeholder="Enter question…" />
          </div>

          <div class="mb-3">
            <select class="form-select form-select-sm"
                    formControlName="type" (change)="onTypeChange(qi)">
              <option value="mcq">Multiple choice</option>
              <option value="true-false">True / False</option>
              <option value="fill-blank">Fill in the blank</option>
            </select>
          </div>

          <!-- Grade + Points row -->
<div class="row g-2 mt-1">
  <div class="col-6">
    <label class="form-label small fw-semibold">
      Grade points
      <span class="text-muted fw-normal">(academic score)</span>
    </label>
    <div class="input-group input-group-sm">
      <input type="number" class="form-control"
             formControlName="grade" min="0" placeholder="10" />
      <span class="input-group-text">pts</span>
    </div>
  </div>
  <div class="col-6">
    <label class="form-label small fw-semibold">
      Reward points
      <span class="text-muted fw-normal">(gamification ⚡)</span>
    </label>
    <div class="input-group input-group-sm">
      <input type="number" class="form-control"
             formControlName="points" min="0" placeholder="50" />
      <span class="input-group-text">⚡</span>
    </div>
  </div>
</div>
          <!-- MCQ options -->
          <ng-container *ngIf="q.get('type')?.value === 'mcq'">
            <div formArrayName="options">
              <div *ngFor="let opt of optionsFor(qi).controls; let oi = index"
                   [formGroupName]="oi"
                   class="d-flex align-items-center gap-2 mb-2">
                <input class="form-control form-control-sm"
                       formControlName="text"
                       placeholder="Option {{ oi + 1 }}" />
                <button type="button" class="btn btn-sm btn-outline-danger"
                        (click)="removeOption(qi, oi)"
                        [disabled]="optionsFor(qi).length <= 2">✕</button>
              </div>
            </div>
            <button type="button" class="btn btn-sm btn-outline-secondary mb-3"
                    (click)="addOption(qi)">+ Add option</button>

            <div>
              <label class="form-label small fw-semibold">Correct answer</label>
              <select class="form-select form-select-sm" formControlName="correctAnswer">
                <option *ngFor="let opt of optionsFor(qi).controls"
                        [value]="opt.get('id')?.value">
                  {{ opt.get('text')?.value || '(empty)' }}
                </option>
              </select>
            </div>
          </ng-container>

          <!-- True / False -->
          <ng-container *ngIf="q.get('type')?.value === 'true-false'">
            <label class="form-label small fw-semibold">Correct answer</label>
            <select class="form-select form-select-sm" formControlName="correctAnswer">
              <option value="True">True</option>
              <option value="False">False</option>
            </select>
          </ng-container>

          <!-- Fill in the blank -->
          <ng-container *ngIf="q.get('type')?.value === 'fill-blank'">
            <label class="form-label small fw-semibold">Correct answer</label>
            <input class="form-control form-control-sm"
                   formControlName="correctAnswer"
                   placeholder="Expected answer…" />
          </ng-container>

        </div>
      </div>

      <button type="button" class="btn btn-outline-primary btn-sm mb-4"
              (click)="addQuestion()">
        + Add question
      </button>

      <div class="d-flex justify-content-end">
        <!-- Button label changes based on mode -->
        <button type="submit" class="btn btn-primary px-4"
                [disabled]="form.invalid">
          {{ isEditMode ? 'Update Activity' : 'Save Activity' }}
        </button>
      </div>

    </form>
  </div>
</div>
