<div class="container-fluid px-4 py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <h5 class="fw-semibold mb-1">Manage Activities</h5>
      <p class="text-muted small mb-0">Create and manage assignments, quizzes, and projects</p>
    </div>
    <button class="btn btn-primary d-flex align-items-center gap-2 px-3"
            routerLink="/activities/create">
      <span class="fs-5 lh-1">+</span> Create Activity
    </button>
  </div>

  <!-- Card -->
  <div class="activities-card p-4">
    <h6 class="fw-semibold mb-3">Current Activities</h6>

    <div *ngIf="service.activities$().length === 0" class="text-muted small py-3 text-center">
      No activities yet. Click "Create Activity" to get started.
    </div>

    <!-- Activity rows -->
    <div class="activity-row d-flex align-items-center justify-content-between px-3 py-3 mb-2 rounded"
         *ngFor="let activity of service.activities$()">

      <!-- Left: icon + info -->
      <div class="d-flex align-items-center gap-3">
        <div class="activity-icon d-flex align-items-center justify-content-center rounded-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div>
          <div class="fw-semibold small">{{ activity.title }}</div>
          <div class="text-muted" style="font-size: 0.78rem;">
            {{ activity.subject || 'General' }}
            <span class="mx-1">•</span>
            <span class="text-capitalize">{{ activity.type }}</span>
          </div>
        </div>
      </div>

      <!-- Right: due date + points + actions -->
      <div class="d-flex align-items-center gap-4">
        <div class="text-muted d-flex align-items-center gap-1" style="font-size: 0.78rem;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          DUE: {{ activity.createdAt | date:'yyyy-MM-dd' }}
        </div>

        <div class="points-badge d-flex align-items-center gap-1">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          50 Pts
        </div>

        <div class="d-flex align-items-center gap-2">
         <button class="btn btn-sm btn-outline-secondary px-3"
        [routerLink]="['/activities', activity.id, 'edit']">
         Edit
        </button>
          <button class="btn btn-sm btn-link text-danger p-0 ms-1"
                  (click)="deleteActivity(activity.id)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
