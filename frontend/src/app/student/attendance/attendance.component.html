<div class="p-layout">
  <app-student-sidebar></app-student-sidebar>
  <div class="p-layout__main">
    <app-student-topbar pageTitle="Attendance" [venturePoints]="ps.profile().venturePoints" [level]="ps.profile().level"></app-student-topbar>
    <div class="p-body">
      <div class="p-heading"><h1 class="p-heading__title">My Attendance</h1><p class="p-heading__sub">Track your attendance record</p></div>
      <div class="att-cards">
        <div class="att-card att-card--green"><div class="att-card__val">{{ ps.presentDays }}</div><div class="att-card__lbl">Present Days</div></div>
        <div class="att-card att-card--red">  <div class="att-card__val">{{ ps.absentDays }}</div> <div class="att-card__lbl">Absent Days</div></div>
        <div class="att-card att-card--amber"><div class="att-card__val">{{ ps.lateDays }}</div>   <div class="att-card__lbl">Late Days</div></div>
        <div class="att-card att-card--blue"> <div class="att-card__val">{{ presentPct }}%</div>  <div class="att-card__lbl">Attendance %</div></div>
      </div>
      <div class="filter-row">
        <div class="filter-group"><label>Subject</label>
          <select [(ngModel)]="filterSubj" (ngModelChange)="filterSubj.set($event)">
            <option *ngFor="let s of subjects" [value]="s">{{ s==='all'?'All Subjects':s }}</option>
          </select>
        </div>
      </div>
      <div class="p-card">
        <div class="p-card__header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Attendance Records</div>
        <div style="overflow-x:auto">
          <table class="p-table">
            <thead><tr><th>Date</th><th>Subject</th><th>Status</th><th>Notes</th></tr></thead>
            <tbody>
              <tr *ngFor="let r of filtered()">
                <td>{{ r.date }}</td><td style="font-weight:600">{{ r.subject }}</td>
                <td><span [style.background]="sb(r.status)" [style.color]="scolor(r.status)" style="padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600">{{ r.status | titlecase }}</span></td>
                <td style="color:#aaa">{{ r.notes||'—' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
