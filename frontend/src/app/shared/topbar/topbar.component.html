<header class="topbar">
  <div class="topbar__title">{{ pageTitle }}</div>

  <!-- Search bar -->
  <div class="topbar__search" *ngIf="showSearch">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search..." [(ngModel)]="searchQuery">
  </div>

  <div class="topbar__right">
    <!-- Messages -->
    <button class="topbar__icon-btn" [routerLink]="messagesRoute" title="Messages">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <!-- Notifications -->
    <button class="topbar__icon-btn topbar__icon-btn--notif" [routerLink]="notificationsRoute" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="topbar__badge">3</span>
    </button>
    <!-- User -->
    <div class="topbar__user">
      <div class="topbar__avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="topbar__user-info">
        <span class="topbar__username">{{ userName }}</span>
        <span class="topbar__role">{{ roleName }}</span>
      </div>
    </div>
  </div>
</header>
