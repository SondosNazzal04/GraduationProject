<header class="s-topbar">
  <div class="s-topbar__title">{{ pageTitle }}</div>

  <!-- Search -->
  <div class="s-topbar__search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search..." [(ngModel)]="searchQuery">
  </div>

  <div class="s-topbar__right">
    <!-- VP balance -->
    <div class="s-topbar__vp">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
      <span>{{ venturePoints | number }}</span>
    </div>
    <!-- Level badge -->
    <div class="s-topbar__level">Lv.{{ level }}</div>
    <!-- Notifications -->
    <button class="s-topbar__icon-btn" routerLink="/student-notifications" title="Notifications" style="position:relative">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="s-topbar__badge" *ngIf="notifCount > 0">{{ notifCount }}</span>
    </button>
    <!-- User -->
    <div class="s-topbar__user">
      <div class="s-topbar__avatar">{{ initials }}</div>
      <div class="s-topbar__user-info">
        <span class="s-topbar__username">{{ studentName }}</span>
        <span class="s-topbar__role">Student</span>
      </div>
    </div>
  </div>
</header>
