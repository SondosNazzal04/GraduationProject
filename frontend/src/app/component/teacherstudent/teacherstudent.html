<div class="p-layout">
  <app-sidebar></app-sidebar>
  <div class="p-layout__main">
    <app-topbar pageTitle="Students" [userName]="teacherName"></app-topbar>
    <div class="p-body">

      <!-- Header -->
      <div class="page-header">
        <div>
          <h1 class="page-header__title">Students</h1>
          <p class="page-header__sub">Manage and view all your students</p>
        </div>
        <div class="page-header__stats">
          <div class="header-stat">
            <span class="header-stat__val">{{ students.length }}</span>
            <span class="header-stat__lbl">Total Students</span>
          </div>
          <div class="header-stat">
            <span class="header-stat__val">{{ classes.length - 1 }}</span>
            <span class="header-stat__lbl">Classes</span>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search students..." [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()">
        </div>
        <div class="class-tabs">
          <button *ngFor="let c of classes"
                  [class.active]="selectedClass === c"
                  (click)="selectedClass = c; applyFilter()">
            {{ c === 'all' ? 'All Classes' : c }}
          </button>
        </div>
      </div>

      <!-- Students Grid -->
      <div class="students-grid">
        <div class="student-card" *ngFor="let s of filtered">
          <div class="student-card__top">
            <div class="student-card__avatar">{{ s.initials }}</div>
            <div class="student-card__info">
              <div class="student-card__name">{{ s.firstName }} {{ s.lastName }}</div>
              <div class="student-card__meta">
                <span class="badge badge--class">{{ s.className }}</span>
                <span class="badge badge--grade">{{ s.gradeLevel }}</span>
              </div>
            </div>
          </div>
          <div class="student-card__stats">
            <div class="mini-stat">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1565C0" stroke-width="2.5">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
              </svg>
              <span>{{ s.venturePoints | number }}</span>
              <label>VP</label>
            </div>
            <div class="mini-stat">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" [attr.stroke]="getGpaColor(s.gpa)" stroke-width="2.5">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
              <span [style.color]="getGpaColor(s.gpa)">{{ s.gpa }}</span>
              <label>GPA</label>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="filtered.length === 0">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
          <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        </svg>
        <p>No students found</p>
      </div>

    </div>
  </div>
</div>
