<div class="modal-backdrop fade show" *ngIf="showModal"
    style="z-index:1040;"></div>

<div class="modal d-block" tabindex="-1" role="dialog" *ngIf="showModal"
    style="z-index:1050;">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <form (ngSubmit)="save()" #actForm="ngForm" class="needs-validation"
                novalidate>
                <div class="modal-header">
                    <h5 class="modal-title">{{ isEditing ? 'Edit Activity' :
                        'Create Activity' }}</h5>
                    <button type="button" class="btn-close" aria-label="Close"
                        (click)="closeModal()"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input name="title" class="form-control" required
                            [(ngModel)]="current.title" #title="ngModel">
                        <div class="text-danger small"
                            *ngIf="title.invalid && title.touched">Title is
                            required</div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-6">
                            <label class="form-label">Subject</label>
                            <input name="subject" class="form-control" required
                                [(ngModel)]="current.subject">
                        </div>
                        <div class="mb-3 col-6">
                            <label class="form-label">Type</label>
                            <select name="type" class="form-select" required
                                [(ngModel)]="current.type">
                                <option value="Home work">Home work</option>
                                <option value="Quiz">Quiz</option>
                                <option value="Project">Project</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3 col-6">
                            <label class="form-label">Due Date</label>
                            <input name="dueDate" type="date"
                                class="form-control" required
                                [(ngModel)]="current.dueDate">
                        </div>
                        <div class="mb-3 col-6">
                            <label class="form-label">Points</label>
                            <input name="points" type="number"
                                class="form-control" required
                                [(ngModel)]="current.points" min="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea
                            name="description"
                            class="form-control"
                            rows="3"
                            placeholder="Activity description..."
                            [(ngModel)]="current.description">
                           </textarea>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                        (click)="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary"
                        [disabled]="actForm.invalid">
                        {{ isEditing ? 'Save changes' : 'Create' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
