<div class="layout">
  <app-parent-sidebar></app-parent-sidebar>
  <div class="layout__main">
    <app-topbar pageTitle="Notifications" userName="Omar Rami"></app-topbar>
    <div class="page-body">

      <div class="page-header">
        <div>
          <h1 class="page-header__title">Notifications</h1>
          <p class="page-header__sub">Stay updated on your children's academic activities</p>
        </div>
        <div class="header-right">
          <div class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }} unread</div>
          <button class="mark-all-btn" (click)="markAllRead()">Mark all as read</button>
        </div>
      </div>

      <div class="notif-list">
        <div class="notif-card" *ngFor="let n of notifications"
             [class.notif-card--unread]="!n.read"
             (click)="markRead(n)">
          <div class="notif-card__dot" [style.background]="getTypeBg(n.type)" [style.color]="getTypeColor(n.type)">
            <svg *ngIf="n.type === 'grade'"      width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <svg *ngIf="n.type === 'attendance'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <svg *ngIf="n.type === 'badge'"      width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
            <svg *ngIf="n.type === 'message'"    width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <svg *ngIf="n.type === 'assignment'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="notif-card__content">
            <div class="notif-card__title">{{ n.title }}</div>
            <div class="notif-card__body">{{ n.body }}</div>
            <div class="notif-card__meta">
              <span class="notif-card__child">{{ n.childName }}</span>
              <span>·</span>
              <span class="notif-card__time">{{ n.timeAgo }}</span>
            </div>
          </div>
          <div class="notif-card__unread-dot" *ngIf="!n.read"></div>
        </div>
      </div>

    </div>
  </div>
</div>
