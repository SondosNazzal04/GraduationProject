<div class="p-layout">
  <app-parent-sidebar></app-parent-sidebar>
  <div class="p-layout__main">
    <app-topbar pageTitle="Teachers" userName="Omar Rami"></app-topbar>
    <div class="p-body">
      <div class="p-heading"><h1 class="p-heading__title">Teachers</h1><p class="p-heading__sub">Contact your children's teachers</p></div>
      <div class="search-row">
        <div class="search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search teachers..." [value]="query()" (input)="query.set($any($event.target).value)">
        </div>
      </div>
      <div class="teachers-grid">
        <div class="teacher-card" *ngFor="let t of filtered; let i=index">
          <div class="teacher-card__avatar" [style.background]="color(i)">{{ t.initials }}</div>
          <div class="teacher-card__name">{{ t.name }}</div>
          <div class="teacher-card__subject chip chip--blue">{{ t.subject }}</div>
          <div class="teacher-card__contacts">
            <div class="teacher-card__contact-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <a [href]="'mailto:'+t.email" style="color:#1565C0;font-size:12px">{{ t.email }}</a>
            </div>
            <div class="teacher-card__contact-row">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.64 4.35 2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span style="font-size:12px;color:#666">{{ t.phone }}</span>
            </div>
          </div>
          <div class="teacher-card__actions">
            <button class="btn-primary" style="font-size:12px;padding:7px 14px">Message</button>
            <button class="btn-ghost"   style="font-size:12px;padding:7px 14px">Schedule</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
